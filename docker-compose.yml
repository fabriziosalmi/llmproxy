# Requires Docker Compose v2 (`docker compose`, the plugin).
# Legacy `docker-compose` v1 is NOT supported — it breaks with modern
# urllib3 (HTTPConnection.request() got an unexpected keyword argument 'chunked').
# Install the plugin: sudo apt install docker-compose-plugin (Debian/Ubuntu)
# or see https://docs.docker.com/compose/install/linux/
services:
  llmproxy:
    build: .
    container_name: llmproxy
    restart: unless-stopped
    ports:
      - "8090:8090"   # Proxy API
      - "9091:9091"   # Prometheus metrics
    volumes:
      - llmproxy-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./plugins:/app/plugins/bundled:ro
      - llmproxy-plugins:/app/plugins/installed
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    # Make the Docker host reachable as `host.docker.internal` from inside the
    # container on Linux (macOS/Windows Desktop already provide this alias).
    # Needed for auto-discovery of locally-running Ollama/LM Studio/vLLM.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: llmproxy-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  llmproxy-data:
    driver: local
  llmproxy-plugins:
    driver: local
  redis-data:
    driver: local
