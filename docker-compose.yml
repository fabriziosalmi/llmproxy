version: "3.9"

services:
  llmproxy:
    build: .
    container_name: llmproxy
    restart: unless-stopped
    ports:
      - "8090:8090"   # Proxy API
      - "9091:9091"   # Prometheus metrics
    volumes:
      - llmproxy-data:/app/data
      - ./config.yaml:/app/config.yaml:ro
      - ./plugins:/app/plugins/bundled:ro
      - llmproxy-plugins:/app/plugins/installed
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  llmproxy-data:
    driver: local
  llmproxy-plugins:
    driver: local
