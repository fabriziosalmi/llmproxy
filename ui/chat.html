<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <title>LLMProxy — Chat</title>
    <script src="vendor/tailwind.js"></script>
    <link rel="stylesheet" href="vendor/fonts.css">
    <style>
        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: #050506; font-family: 'Inter', system-ui, sans-serif; color: #f5f5f7; margin: 0; height: 100vh; display: flex; flex-direction: column; }
        .font-mono { font-family: 'JetBrains Mono', monospace !important; }
        #messages { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.08) transparent; }
        #messages::-webkit-scrollbar { width: 4px; }
        #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
        .typing-dot { animation: blink 1.2s ease-in-out infinite; }
        pre code { white-space: pre-wrap; word-break: break-word; }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="shrink-0 border-b border-white/[0.06] px-6 py-3 flex items-center justify-between bg-[#0a0a0c]/80 backdrop-blur-xl">
        <div class="flex items-center gap-3">
            <a href="/ui/" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <svg class="w-7 h-7" viewBox="0 0 32 32">
                    <circle cx="16" cy="16" r="14" fill="#0a0a0c" stroke="#f43f5e" stroke-width="1.5"/>
                    <ellipse cx="16" cy="16" rx="10" ry="7" fill="none" stroke="#f43f5e" stroke-width="1.5"/>
                    <circle cx="16" cy="16" r="3.5" fill="#f43f5e"/>
                    <circle cx="17.2" cy="14.8" r="1.2" fill="#fff" opacity="0.9"/>
                </svg>
                <span class="text-sm font-black tracking-tight">LLMProxy</span>
            </a>
            <span class="text-[10px] text-slate-600 font-mono">Chat</span>
        </div>
        <div class="flex items-center gap-3">
            <select id="model-select" class="bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-[11px] text-white font-mono focus:outline-none focus:border-rose-500/50 min-w-[200px]">
                <option value="auto">auto (smart routing)</option>
            </select>
            <div id="status-indicator" class="flex items-center gap-1.5">
                <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
                <span class="text-[9px] font-mono text-slate-600">Connecting...</span>
            </div>
        </div>
    </header>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto px-4 py-6 space-y-4">
        <div class="max-w-3xl mx-auto text-center py-16">
            <svg class="w-12 h-12 mx-auto mb-4 opacity-20" viewBox="0 0 32 32">
                <circle cx="16" cy="16" r="14" fill="none" stroke="#f43f5e" stroke-width="1"/>
                <ellipse cx="16" cy="16" rx="10" ry="7" fill="none" stroke="#f43f5e" stroke-width="1"/>
                <circle cx="16" cy="16" r="3" fill="#f43f5e" opacity="0.5"/>
            </svg>
            <p class="text-slate-500 text-sm">Send a message to start.</p>
            <p class="text-slate-700 text-[10px] font-mono mt-2">Routed through LLMProxy security pipeline.</p>
        </div>
    </div>

    <!-- Input -->
    <div class="shrink-0 border-t border-white/[0.06] bg-[#0a0a0c]/80 backdrop-blur-xl px-4 py-4">
        <div class="max-w-3xl mx-auto flex gap-3">
            <textarea id="input" rows="1" placeholder="Type a message..."
                class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-rose-500/30 resize-none font-mono"
                style="max-height: 200px;"></textarea>
            <button id="send-btn"
                class="shrink-0 px-5 py-3 bg-rose-500/20 hover:bg-rose-500/30 border border-rose-500/30 rounded-xl text-rose-400 text-sm font-bold transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                Send
            </button>
        </div>
        <div class="max-w-3xl mx-auto flex items-center justify-between mt-2 px-1">
            <div id="token-info" class="text-[9px] font-mono text-slate-700"></div>
            <div class="text-[9px] font-mono text-slate-700">
                <span id="latency-info"></span>
            </div>
        </div>
    </div>

    <script>
    const BASE = window.location.origin;
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const modelSelect = document.getElementById('model-select');
    const statusEl = document.getElementById('status-indicator');
    const tokenInfo = document.getElementById('token-info');
    const latencyInfo = document.getElementById('latency-info');

    let conversationHistory = [];
    let isStreaming = false;

    // Auth
    function getToken() {
        return localStorage.getItem('proxy_key') || '';
    }

    function authHeaders() {
        const t = getToken();
        const h = { 'Content-Type': 'application/json' };
        if (t) h['Authorization'] = `Bearer ${t}`;
        return h;
    }

    // Init: load models
    async function init() {
        try {
            const res = await fetch(`${BASE}/v1/models`, { headers: authHeaders() });
            if (res.ok) {
                const data = await res.json();
                const models = (data.data || []).filter(m => !m.id.includes('embed'));
                models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.textContent = `${m.id} (${m.owned_by})`;
                    modelSelect.appendChild(opt);
                });
                setStatus('live');
            } else {
                setStatus('offline');
            }
        } catch {
            setStatus('offline');
        }

        // Check if we need auth
        if (!getToken()) {
            const key = prompt('Enter your LLMProxy API key:');
            if (key) localStorage.setItem('proxy_key', key);
        }
    }

    function setStatus(state) {
        const dot = statusEl.querySelector('div');
        const text = statusEl.querySelector('span');
        if (state === 'live') {
            dot.className = 'w-1.5 h-1.5 rounded-full bg-emerald-400 shadow-[0_0_6px_rgba(52,211,153,0.4)]';
            text.textContent = 'Connected';
            text.className = 'text-[9px] font-mono text-emerald-400';
        } else {
            dot.className = 'w-1.5 h-1.5 rounded-full bg-rose-500';
            text.textContent = 'Offline';
            text.className = 'text-[9px] font-mono text-rose-500';
        }
    }

    // Render message
    function addMessage(role, content, meta = {}) {
        // Remove welcome screen
        const welcome = messagesEl.querySelector('.text-center');
        if (welcome) welcome.remove();

        const wrapper = document.createElement('div');
        wrapper.className = `max-w-3xl mx-auto flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;

        const bubble = document.createElement('div');
        bubble.className = role === 'user'
            ? 'max-w-[80%] bg-rose-500/10 border border-rose-500/20 rounded-2xl rounded-br-md px-4 py-3'
            : 'max-w-[80%] bg-white/[0.03] border border-white/[0.06] rounded-2xl rounded-bl-md px-4 py-3';

        const label = document.createElement('div');
        label.className = 'text-[9px] font-bold uppercase tracking-widest mb-1 ' +
            (role === 'user' ? 'text-rose-400' : 'text-slate-500');
        label.textContent = role === 'user' ? 'You' : (meta.model || 'Assistant');

        const body = document.createElement('div');
        body.className = 'text-sm leading-relaxed text-slate-200 font-mono whitespace-pre-wrap';
        body.textContent = content;

        bubble.appendChild(label);
        bubble.appendChild(body);
        wrapper.appendChild(bubble);
        messagesEl.appendChild(wrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;

        return body;
    }

    function addTypingIndicator() {
        const wrapper = document.createElement('div');
        wrapper.id = 'typing';
        wrapper.className = 'max-w-3xl mx-auto flex justify-start';
        wrapper.innerHTML = `
            <div class="bg-white/[0.03] border border-white/[0.06] rounded-2xl rounded-bl-md px-4 py-3">
                <div class="flex items-center gap-1">
                    <div class="w-1.5 h-1.5 rounded-full bg-slate-500 typing-dot"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-slate-500 typing-dot" style="animation-delay:0.2s"></div>
                    <div class="w-1.5 h-1.5 rounded-full bg-slate-500 typing-dot" style="animation-delay:0.4s"></div>
                </div>
            </div>`;
        messagesEl.appendChild(wrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTypingIndicator() {
        document.getElementById('typing')?.remove();
    }

    // Send message with streaming
    async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || isStreaming) return;

        isStreaming = true;
        sendBtn.disabled = true;
        inputEl.value = '';
        inputEl.style.height = 'auto';

        addMessage('user', text);
        conversationHistory.push({ role: 'user', content: text });
        addTypingIndicator();

        const model = modelSelect.value;
        const startTime = performance.now();

        try {
            const res = await fetch(`${BASE}/v1/chat/completions`, {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({
                    model,
                    messages: conversationHistory,
                    stream: true,
                }),
            });

            if (!res.ok) {
                const err = await res.text();
                removeTypingIndicator();
                addMessage('assistant', `Error ${res.status}: ${err}`, { model: 'error' });
                return;
            }

            removeTypingIndicator();
            const bodyEl = addMessage('assistant', '', { model });

            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            let fullContent = '';
            let usage = null;
            let responseModel = model;

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                for (const line of chunk.split('\n')) {
                    if (!line.startsWith('data: ') || line === 'data: [DONE]') continue;
                    try {
                        const data = JSON.parse(line.slice(6));
                        const delta = data.choices?.[0]?.delta?.content || '';
                        if (delta) {
                            fullContent += delta;
                            bodyEl.textContent = fullContent;
                            messagesEl.scrollTop = messagesEl.scrollHeight;
                        }
                        if (data.usage) usage = data.usage;
                        if (data.model) responseModel = data.model;
                    } catch {}
                }
            }

            conversationHistory.push({ role: 'assistant', content: fullContent });

            // Update meta
            const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
            latencyInfo.textContent = `${elapsed}s`;
            if (usage) {
                tokenInfo.textContent = `${usage.prompt_tokens || '?'}p + ${usage.completion_tokens || '?'}c tokens`;
            }
            // Update label with actual model
            const label = bodyEl.previousSibling;
            if (label) label.textContent = responseModel;

        } catch (e) {
            removeTypingIndicator();
            addMessage('assistant', `Network error: ${e.message}`, { model: 'error' });
        } finally {
            isStreaming = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }
    }

    // Auto-resize textarea
    inputEl.addEventListener('input', () => {
        inputEl.style.height = 'auto';
        inputEl.style.height = Math.min(inputEl.scrollHeight, 200) + 'px';
    });

    // Send on Enter (Shift+Enter for newline)
    inputEl.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    sendBtn.addEventListener('click', sendMessage);

    init();
    </script>
</body>
</html>
