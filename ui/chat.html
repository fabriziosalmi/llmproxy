<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <title>LLMProxy — Chat</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="vendor/fonts.css" />
        <!-- highlight.js GitHub-dark theme: scoped to .hljs nodes so it doesn't
         bleed into surrounding chrome. Loaded ahead of chat.js so the first
         render after stream completion can colorize without a FOUC. -->
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css"
        />
        <script defer src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
        <style>
            * {
                box-sizing: border-box;
                -webkit-font-smoothing: antialiased;
            }
            body {
                background: #050506;
                font-family: 'Inter', system-ui, sans-serif;
                color: #f5f5f7;
                margin: 0;
                height: 100vh;
                display: flex;
                flex-direction: column;
            }
            .font-mono {
                font-family: 'JetBrains Mono', monospace !important;
            }
            #messages {
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.08) transparent;
            }
            #messages::-webkit-scrollbar {
                width: 4px;
            }
            #messages::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.08);
                border-radius: 4px;
            }
            @keyframes blink {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.3;
                }
            }
            .typing-dot {
                animation: blink 1.2s ease-in-out infinite;
            }

            /* Code blocks — preserve whitespace, override hljs default bg with our token-aligned surface. */
            .prose-invert pre {
                position: relative;
                margin: 0.5rem 0;
            }
            .prose-invert pre code,
            .prose-invert pre code.hljs {
                display: block;
                white-space: pre;
                overflow-x: auto;
                word-break: normal;
                padding: 0.75rem 0.85rem;
                background: rgba(255, 255, 255, 0.04);
                border-radius: 0.5rem;
                font-size: 12px;
                line-height: 1.55;
            }

            /* Markdown prose: force Inter on headers + paragraph spacing.
           Without this they inherit the body font but ALSO any ambient
           font-family from siblings (code/pre rules) once :where()/cascade
           rules kick in. Belt-and-braces. */
            .prose-invert h1,
            .prose-invert h2,
            .prose-invert h3 {
                font-family: 'Inter', system-ui, sans-serif;
                margin-top: 0.85rem;
                margin-bottom: 0.35rem;
                letter-spacing: -0.01em;
            }
            .prose-invert h1 {
                font-size: 1.05rem;
            }
            .prose-invert h2 {
                font-size: 0.95rem;
            }
            .prose-invert h3 {
                font-size: 0.875rem;
            }
            .prose-invert li {
                margin: 0.15rem 0;
            }
            .prose-invert br + br {
                display: none;
            } /* collapse double breaks */

            /* Language label — sits in the top-left so users see at a glance
           which grammar hljs picked (or nothing, if the LLM emitted a bare
           fence). Same size + monospace as the copy button on the right. */
            .code-lang {
                position: absolute;
                top: 0.35rem;
                left: 0.5rem;
                font-size: 9px;
                font-family: 'JetBrains Mono', monospace;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: rgb(148 163 184 / 0.55);
                pointer-events: none;
                -webkit-user-select: none;
                user-select: none;
            }

            /* Copy button — sits in the top-right of every <pre>. */
            .copy-btn {
                position: absolute;
                top: 0.35rem;
                right: 0.35rem;
                padding: 0.15rem 0.5rem;
                font-size: 9px;
                font-family: 'JetBrains Mono', monospace;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: rgb(244 63 94 / 0.85);
                background: rgb(244 63 94 / 0.08);
                border: 1px solid rgb(244 63 94 / 0.22);
                border-radius: 0.35rem;
                cursor: pointer;
                opacity: 0;
                transition:
                    opacity 0.15s ease,
                    background 0.15s ease;
            }
            .prose-invert pre:hover .copy-btn {
                opacity: 1;
            }
            .copy-btn:hover {
                background: rgb(244 63 94 / 0.16);
            }
            .copy-btn.copied {
                opacity: 1;
                color: rgb(52 211 153);
                background: rgb(52 211 153 / 0.1);
                border-color: rgb(52 211 153 / 0.25);
            }
        </style>
    </head>
    <body>
        <!-- Header -->
        <header
            class="shrink-0 border-b border-white/[0.06] px-6 py-3 flex items-center justify-between bg-[#0a0a0c]/80 backdrop-blur-xl"
        >
            <div class="flex items-center gap-3">
                <a href="/ui/" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                    <svg class="w-7 h-7" viewBox="0 0 32 32">
                        <circle cx="16" cy="16" r="14" fill="#0a0a0c" stroke="#f43f5e" stroke-width="1.5" />
                        <ellipse cx="16" cy="16" rx="10" ry="7" fill="none" stroke="#f43f5e" stroke-width="1.5" />
                        <circle cx="16" cy="16" r="3.5" fill="#f43f5e" />
                        <circle cx="17.2" cy="14.8" r="1.2" fill="#fff" opacity="0.9" />
                    </svg>
                    <span class="text-sm font-black tracking-tight">LLMProxy</span>
                </a>
                <span class="text-[10px] text-slate-600 font-mono">Chat</span>
            </div>
            <div class="flex items-center gap-3">
                <select
                    id="model-select"
                    class="bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-[11px] text-white font-mono focus:border-rose-500/50 min-w-[200px]"
                >
                    <option value="auto">auto (smart routing)</option>
                </select>
                <div id="status-indicator" class="flex items-center gap-1.5">
                    <div class="w-1.5 h-1.5 rounded-full bg-slate-600"></div>
                    <span class="text-[9px] font-mono text-slate-600">Connecting...</span>
                </div>
            </div>
        </header>

        <!-- Messages -->
        <div id="messages" class="flex-1 overflow-y-auto px-4 py-6 space-y-4">
            <div class="max-w-3xl mx-auto text-center py-16">
                <svg class="w-12 h-12 mx-auto mb-4 opacity-20" viewBox="0 0 32 32">
                    <circle cx="16" cy="16" r="14" fill="none" stroke="#f43f5e" stroke-width="1" />
                    <ellipse cx="16" cy="16" rx="10" ry="7" fill="none" stroke="#f43f5e" stroke-width="1" />
                    <circle cx="16" cy="16" r="3" fill="#f43f5e" opacity="0.5" />
                </svg>
                <p class="text-slate-500 text-sm">Send a message to start.</p>
                <p class="text-slate-700 text-[10px] font-mono mt-2">Routed through LLMProxy security pipeline.</p>
            </div>
        </div>

        <!-- Input -->
        <div class="shrink-0 border-t border-white/[0.06] bg-[#0a0a0c]/80 backdrop-blur-xl px-4 py-4">
            <div class="max-w-3xl mx-auto flex gap-3">
                <textarea
                    id="input"
                    rows="1"
                    placeholder="Type a message..."
                    class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white placeholder-slate-600 focus:border-rose-500/30 resize-none font-mono"
                    style="max-height: 200px"
                ></textarea>
                <button
                    id="send-btn"
                    class="shrink-0 px-5 py-3 bg-rose-500/20 hover:bg-rose-500/30 border border-rose-500/30 rounded-xl text-rose-400 text-sm font-bold transition-colors disabled:opacity-30 disabled:cursor-not-allowed"
                >
                    Send
                </button>
            </div>
            <div class="max-w-3xl mx-auto flex items-center justify-between mt-2 px-1">
                <div id="token-info" class="text-[9px] font-mono text-slate-700"></div>
                <div class="text-[9px] font-mono text-slate-700">
                    <span id="latency-info"></span>
                </div>
            </div>
        </div>

        <script type="module" src="chat.js"></script>
    </body>
</html>
