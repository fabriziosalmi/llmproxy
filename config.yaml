# LLM Proxy Configuration

server:
  host: 0.0.0.0
  port: 8090
  timeout: 30s
  keep_alive: 60s
  tls:
    enabled: false
    cert_file: "/etc/llmproxy/certs/server.crt"
    key_file: "/etc/llmproxy/certs/server.key"
    min_version: "1.2"
  auth:
    enabled: true
    # API keys loaded from env: LLM_PROXY_API_KEYS (comma-separated)
    api_keys_env: "LLM_PROXY_API_KEYS"
  metrics:
    enabled: false
    port: 9091
  admin:
    enabled: true
    port: 8081
  vllm:
    enabled: true
    model_path: "smollm-360m-instruct-mlx"
    fallback_threshold: 0.1

# Security shield — read by SecurityShield at root level
security:
  enabled: true
  max_payload_size_kb: 512
  max_messages: 50
  link_sanitization:
    enabled: true
    blocked_domains: ["malicious-site.com", "phishing.net"]

# Identity & SSO — Multi-provider OIDC
identity:
  enabled: false  # Set true to require JWT auth (falls back to API key if false)
  default_role: "user"
  providers:
    - name: google
      client_id_env: "OIDC_GOOGLE_CLIENT_ID"
    - name: microsoft
      client_id_env: "OIDC_MICROSOFT_CLIENT_ID"
    - name: apple
      client_id_env: "OIDC_APPLE_CLIENT_ID"
  role_mappings:
    # "admin@example.com": ["admin"]
    # "ops@example.com": ["operator"]
  session_ttl: 3600

local_llm:
  enabled: true
  host: "http://localhost:1234"
  model: "Qwen3-0.6B"
  orchestrator_model: "qwen3.5-4b-mlx"
  vision_model: "qwen3.5-4b-mlx"
  max_recursion_depth: 3

# Strategy for rotating between providers
rotation:
  strategy: "round_robin"  # Options: round_robin, weighted, least_used, random
  failover:
    enabled: true
    max_retries: 3
    retry_delay: 1s
    switch_on_status: [429, 500, 503]

# LLM Providers
endpoints:
  openai:
    base_url: "https://api.openai.com/v1"
    keys_env: "OPENAI_API_KEYS"
    organization_ids_env: "OPENAI_ORG_IDS"
    rate_limit:
      rpm: 3500
      tpm: 60000

  anthropic:
    base_url: "https://api.anthropic.com/v1"
    keys_env: "ANTHROPIC_API_KEYS"
    rate_limit:
      rpm: 1000

  generic_llm:
    base_url: "http://localhost:11434"
    auth_type: "none"

# Monitoring and Logging
logging:
  level: "info"
  format: "json"
  output: "/var/log/llmproxy/proxy.log"
  audit_trail:
    enabled: true
    mask_pii: true

caching:
  enabled: true
  db_path: "cache.db"
  ttl: 3600
  eviction_interval: 3600
  negative_cache:
    maxsize: 50000
    ttl: 300

observability:
  tracing:
    enabled: true
    service_name: "llmproxy"
    otlp_endpoint: null
    console_exporter: true
  sentry:
    dsn_env: "SENTRY_DSN"
  export:
    enabled: false
    output_dir: "exports"
    scrub_pii: true
    compress_on_rotate: true

# ChatOps & Webhook Dispatcher
webhooks:
  enabled: false
  endpoints:
    - name: slack-ops
      target: slack
      url_env: "SLACK_WEBHOOK_URL"
      events: ["circuit_open", "budget_threshold", "panic_activated", "endpoint_down"]
    - name: discord-alerts
      target: discord
      url_env: "DISCORD_WEBHOOK_URL"
      events: ["*"]

chatops:
  telegram:
    enabled: false
    token_env: "TELEGRAM_BOT_TOKEN"
    chat_id: null

# Daily budget tracking — soft_limit triggers a webhook warning
budget:
  daily_limit: 50.0    # Hard cap per day (USD)
  soft_limit: 40.0     # Webhook warning threshold (USD)
  fallback_to_local_on_limit: true

# Litestream SQLite WAL replication (optional)
# See: https://litestream.io/
