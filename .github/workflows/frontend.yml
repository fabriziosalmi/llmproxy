name: Frontend

on:
  push:
    branches: [main]
    paths:
      - 'ui/**'
      - 'proxy/app_factory.py'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'ui/**'
      - 'proxy/app_factory.py'
      - '.github/workflows/frontend.yml'

defaults:
  run:
    working-directory: ui

jobs:
  lint:
    name: Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run lint
      - run: npm run format:check

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run typecheck

  test:
    name: Unit Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-coverage
          path: ui/coverage/
          if-no-files-found: ignore
          retention-days: 7

  build:
    name: Vite Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: ui-dist
          path: ui/dist/
          retention-days: 7

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install backend deps
        working-directory: ${{ github.workspace }}
        run: |
          python -m venv venv
          . venv/bin/activate
          pip install -r requirements.txt

      - name: Install UI deps
        run: npm ci --no-audit --no-fund

      - name: Build UI
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start backend
        working-directory: ${{ github.workspace }}
        env:
          LLM_PROXY_API_KEYS: sk-proxy-ci-test-key
        run: |
          . venv/bin/activate
          if [ ! -f .env ]; then cp .env.example .env; fi
          nohup python main.py > backend.log 2>&1 &
          echo $! > backend.pid
          for i in {1..30}; do
            if curl -fsS http://localhost:8090/health > /dev/null 2>&1; then
              echo "Backend up after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Backend failed to start in 30s"
          cat backend.log
          exit 1

      - name: Run Playwright
        env:
          LLMPROXY_SKIP_WEB_SERVER: '1'
        run: npm run e2e

      - name: Stop backend
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          if [ -f backend.pid ]; then kill "$(cat backend.pid)" 2>/dev/null || true; fi

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: ui/playwright-report/
          retention-days: 7
