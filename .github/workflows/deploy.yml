name: CD - Remote Deploy

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Tailscale VM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v4.2.1

      - name: Connect to Tailscale
        uses: tailscale/github-action@e8519e99292ec9c6ca5e003a3d5203028fb9a89d # v2.0.0
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 100.76.251.33 >> ~/.ssh/known_hosts

      - name: Run Deploy Script
        env:
          PROBE_KEY: ${{ secrets.PROBE_KEY }}
        run: |
          # Executes deploy.sh over SSH tunnel (already configured on runner via Tailscale)
          ./scripts/deploy.sh --yes
