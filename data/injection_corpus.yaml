# LLMProxy — Semantic Injection Corpus
# Hot-reloaded every 30s when file hash changes.
# Add new patterns here — no code change required.
#
# Each pattern is matched via trigram Jaccard similarity (not exact match).
# Categories: override, extraction, hijack, bypass, multilingual, delimiter, social, exfiltration

version: 1

