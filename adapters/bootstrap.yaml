# Bootstrap Adapter Configs
# These are validated, working endpoint configurations for the LLM Proxy.

adapters:
  # ─── Pollinations.ai (GET) — CONFIRMED  ───
  pollinations_get:
    name: "Pollinations.ai (GET)"
    url: "https://text.pollinations.ai/"
    method: "GET"
    auth: "none"
    format: "plain_text"
    rate_limit: "none"
    latency_ms: 90
    notes: "Append URL-encoded prompt to URL path. Returns plain text."
    adapter:
      request_transform: "url_encode_prompt"
      response_transform: "wrap_plain_text_as_openai"
    validated: true
    validated_at: "2026-03-19T11:00:00Z"

  # ─── Pollinations.ai (POST/OpenAI) — CONFIRMED  ───
  pollinations_openai:
    name: "Pollinations.ai (POST)"
    url: "https://text.pollinations.ai/"
    method: "POST"
    auth: "none"
    format: "openai_compat"
    rate_limit: "1 concurrent per IP"
    latency_ms: 1960
    notes: "OpenAI-compatible format. Model: 'openai'. Rate-limited at 1 queued request per IP."
    adapter:
      request_transform: "openai_passthrough"
      response_transform: "openai_passthrough"
      model_override: "openai"
    validated: true
    validated_at: "2026-03-19T11:00:00Z"

  # ─── DuckDuckGo AI Chat — CONFIRMED  ───
  duckduckgo_ai:
    name: "DuckDuckGo AI Chat"
    url: "https://duck.ai/duckchat/v1/chat"
    method: "POST"
    auth: "x-vqd-hash-1"
    format: "sse_stream"
    rate_limit: "session-based"
    latency_ms: 2000
    notes: "Requires browser session for x-vqd-hash-1 token. Model: gpt-4o-mini. SSE response."
    adapter:
      token_source: "browser_sniff"
      token_endpoint: "https://duck.ai/duckchat/v1/status"
      request_transform: "duckduckgo_chat"
      response_transform: "sse_to_openai"
    validated: true
    validated_at: "2026-03-19T11:00:00Z"

  # ─── Groq (Llama-3.3-70B) — CONFIRMED  ───
  groq_llama70b:
    name: "Groq (Llama-3.3-70B)"
    url: "https://api.groq.com/openai/v1/chat/completions"
    method: "POST"
    auth: "bearer"
    auth_env: "GROQ_API_KEY"
    format: "openai_compat"
    rate_limit: "free tier"
    latency_ms: 180
    notes: "Blazing fast. 18 models available. OpenAI-compatible. Free tier."
    adapter:
      request_transform: "openai_passthrough"
      response_transform: "openai_passthrough"
      model_override: "llama-3.3-70b-versatile"
    available_models:
      - llama-3.3-70b-versatile
      - llama-3.1-8b-instant
      - meta-llama/llama-4-scout-17b-16e-instruct
      - qwen/qwen3-32b
    validated: true
    validated_at: "2026-03-19T11:24:00Z"

  # ─── Z.ai (GLM-5) — CONFIRMED via Browser  ───
  z_ai_glm5:
    name: "Z.ai (GLM-5)"
    url: "https://chat.z.ai/api/v2/chat/completions"
    method: "POST"
    auth: "browser_session"
    format: "openai_compat"
    rate_limit: "unknown"
    latency_ms: 1000
    notes: "Free, no login. Needs browser cookies (like DuckDuckGo). GLM-5 model from Zhipu AI."
    adapter:
      token_source: "browser_sniff"
      request_transform: "openai_passthrough"
      response_transform: "openai_passthrough"
      model_override: "glm-5"
    validated: true
    validated_at: "2026-03-19T11:23:00Z"

  # ─── Infercom.ai — CONFIRMED  ───
  infercom_ai:
    name: "Infercom.ai (EU-Sovereign)"
    url: "https://api.infercom.ai/v1/chat/completions"
    method: "POST"
    auth: "bearer"
    auth_env: "INFERCOM_API_KEY"
    format: "openai_compat"
    rate_limit: "free tier"
    latency_ms: 470
    notes: "High-quality EU hosting (Germany). Supports MiniMax, DeepSeek R1, Llama 3.3. OpenAI-compatible."
    adapter:
      request_transform: "openai_passthrough"
      response_transform: "openai_passthrough"
      model_override: "MiniMax-M2.5"
    available_models:
      - MiniMax-M2.5
      - DeepSeek-R1
      - Meta-Llama-3.3-70B-Instruct
    validated: true
    validated_at: "2026-03-19T11:40:00Z"

  # ─── OpenRouter — KEY VALIDATED (Wait for quota)  ───
  openrouter:
    name: "OpenRouter"
    url: "https://openrouter.ai/api/v1/chat/completions"
    method: "POST"
    auth: "bearer"
    auth_env: "OPENROUTER_API_KEY"
    format: "openai_compat"
    rate_limit: "free tier (dynamic)"
    latency_ms: 650
    notes: "Aggregator for free models. Use :free suffix. Key validated, but models can be rate-limited."
    adapter:
      request_transform: "openai_passthrough"
      response_transform: "openai_passthrough"
      model_override: "meta-llama/llama-3.3-70b-instruct:free"
    validated: true
    validated_at: "2026-03-19T11:40:00Z"

